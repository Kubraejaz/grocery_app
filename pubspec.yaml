name: grocery_app
description: A full-featured grocery shopping app with Supabase backend.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.3.4

  # State Management
  provider: ^6.1.2

  # UI
  cached_network_image: ^3.3.1
  flutter_rating_bar: ^4.0.1
  badges: ^3.1.2
  shimmer: ^3.0.0
  fluttertoast: ^8.2.4

  # Utils
  flutter_dotenv: ^5.1.0
  intl: ^0.19.0
  uuid: ^4.4.0
  shared_preferences: ^2.2.2

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    # - .env
    # - assets/images/
    # - assets/icons/